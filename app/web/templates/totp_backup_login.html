<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warden — Backup Code</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --text: #e2e8f0; --muted: #8892a4; --accent: #e74c3c;
      --blue: #3498db; --radius: 8px; --font: system-ui, -apple-system, sans-serif;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 36px; width: 100%; max-width: 380px;
    }
    .brand { font-size: 1.6rem; font-weight: 700; color: var(--accent); letter-spacing: 3px; text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 8px; }
    .description { text-align: center; color: var(--text); font-size: 0.9rem; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    .hint { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
    input[type="text"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 1.1rem;
      font-weight: 600; letter-spacing: 3px; text-align: center;
      padding: 10px 14px; outline: none; transition: border-color 0.15s;
      text-transform: uppercase;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    .field { margin-bottom: 20px; }
    .btn {
      width: 100%; background: var(--accent); color: white; border: none;
      border-radius: var(--radius); font-size: 1rem; font-weight: 600;
      padding: 11px; cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .error {
      background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.4);
      border-radius: var(--radius); color: #e74c3c; font-size: 0.875rem;
      padding: 10px 14px; margin-bottom: 20px;
    }
    .back-link { text-align: center; margin-top: 20px; font-size: 0.85rem; }
    .back-link a { color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">WARDEN</div>
    <div class="subtitle">Backup Code</div>
    <div class="description">Enter one of your saved backup codes. Each code can only be used once.</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login/backup">
      <div class="field">
        <label for="backup_code">Backup Code</label>
        <input type="text" id="backup_code" name="backup_code" autofocus
               autocomplete="off" placeholder="XXXXXX-XXXXXX" spellcheck="false">
        <div class="hint">Format: XXXXXX-XXXXXX</div>
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <div class="back-link">
      <a href="/login/totp">← Back to authenticator code</a>
    </div>
  </div>
</body>
</html>
