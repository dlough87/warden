<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warden — Login</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --text: #e2e8f0; --muted: #8892a4; --accent: #e74c3c;
      --green: #2ecc71; --radius: 8px; --font: system-ui, -apple-system, sans-serif;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 40px 36px; width: 100%; max-width: 380px;
    }
    .brand {
      font-size: 1.6rem; font-weight: 700; color: var(--text);
      letter-spacing: 3px; text-align: center; margin-bottom: 8px;
    }
    .tagline {
      text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 32px;
    }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 1rem;
      padding: 10px 14px; outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="password"]:focus { border-color: var(--accent); }
    input[disabled] { opacity: 0.6; cursor: default; }
    .field { margin-bottom: 20px; }
    .btn {
      width: 100%; background: var(--accent); color: white; border: none;
      border-radius: var(--radius); font-size: 1rem; font-weight: 600;
      padding: 11px; cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .error {
      background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.4);
      border-radius: var(--radius); color: #e74c3c; font-size: 0.875rem;
      padding: 10px 14px; margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
  <svg width="32" height="36" viewBox="0 0 32 32" style="display:block;margin:0 auto 8px" aria-hidden="true"><path d="M16 2L29 7v10c0 7.5-5.5 13.5-13 15C4.5 30.5 3 24.5 3 17V7z" fill="#e74c3c"/><polyline points="9,13 12,22 16,17 20,22 23,13" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/></svg>
  WARDEN
</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="{{ username_value or '' }}" autofocus autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>

    <div style="display:flex;align-items:center;gap:10px;margin:20px 0">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="color:var(--muted);font-size:0.8rem">or</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>

    <button type="button" id="passkey-btn" onclick="loginWithPasskey()"
            style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:0.95rem;font-weight:500;padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color 0.15s">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Sign in with a Passkey
    </button>
    <div id="passkey-error" style="margin-top:10px;font-size:0.875rem;color:#e74c3c;display:none;text-align:center"></div>
  </div>
</body>
<script>
function _b64urlDecode(s) {
  s = s.replace(/-/g, '+').replace(/_/g, '/');
  while (s.length % 4) s += '=';
  const bin = atob(s);
  return Uint8Array.from(bin, c => c.charCodeAt(0)).buffer;
}
function _b64urlEncode(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function loginWithPasskey() {
  const btn = document.getElementById('passkey-btn');
  const errEl = document.getElementById('passkey-error');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.querySelector('span') && (btn.querySelector('span').textContent = 'Waiting\u2026');

  const nextInput = document.querySelector('input[name="next"]');
  const next = nextInput ? nextInput.value : '/';

  try {
    const r1 = await fetch('/login/passkey/begin?next=' + encodeURIComponent(next));
    if (!r1.ok) { const e = await r1.json(); throw new Error(e.error); }
    const options = await r1.json();

    options.challenge = _b64urlDecode(options.challenge);
    if (options.allowCredentials) {
      options.allowCredentials = options.allowCredentials.map(c => ({...c, id: _b64urlDecode(c.id)}));
    }

    const cred = await navigator.credentials.get({ publicKey: options });

    const credJson = {
      id: cred.id,
      rawId: _b64urlEncode(cred.rawId),
      type: cred.type,
      response: {
        clientDataJSON: _b64urlEncode(cred.response.clientDataJSON),
        authenticatorData: _b64urlEncode(cred.response.authenticatorData),
        signature: _b64urlEncode(cred.response.signature),
        userHandle: cred.response.userHandle ? _b64urlEncode(cred.response.userHandle) : null,
      },
    };

    const r2 = await fetch('/login/passkey/complete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(credJson),
    });
    const result = await r2.json();
    if (!r2.ok) throw new Error(result.error);
    window.location.href = result.redirect;
  } catch (e) {
    btn.disabled = false;
    if (e.name !== 'NotAllowedError') {
      errEl.textContent = e.message || 'Passkey sign-in failed.';
      errEl.style.display = 'block';
    }
  }
}
</script>
</html>
