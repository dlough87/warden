{% extends "base.html" %}
{% block title %} — Server Log{% endblock %}
{% block content %}
<div class="section-header">
  <h1>Support</h1>
</div>

{# ── Sub-nav ── #}
<div style="display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0">
  <a href="/support/guide" style="padding:8px 16px;font-size:0.9rem;color:var(--muted);border-bottom:2px solid transparent;text-decoration:none;margin-bottom:-1px">Documentation</a>
  <a href="/support/audit" style="padding:8px 16px;font-size:0.9rem;color:var(--muted);border-bottom:2px solid transparent;text-decoration:none;margin-bottom:-1px">Audit Log</a>
  <a href="/support/logs"  style="padding:8px 16px;font-size:0.9rem;color:var(--text);border-bottom:2px solid var(--accent);text-decoration:none;margin-bottom:-1px">Server Log</a>
  <a href="/support/backup" style="padding:8px 16px;font-size:0.9rem;color:var(--muted);border-bottom:2px solid transparent;text-decoration:none;margin-bottom:-1px">Backup</a>
</div>

<div class="section-header" style="margin-bottom:12px">
  <span style="color:var(--muted);font-size:0.85rem">Last {{ lines|length }} log lines · auto-refreshes every 10 s</span>
  <button class="btn btn-ghost btn-sm" onclick="document.getElementById('log-container').scrollTop = document.getElementById('log-container').scrollHeight">Scroll to bottom ↓</button>
</div>

<div class="card" style="padding:0">
  <div id="log-container" style="overflow-y:auto;max-height:70vh">
    <pre id="log-lines"
         hx-get="/support/logs/fragment"
         hx-trigger="every 10s"
         hx-swap="innerHTML"
         style="padding:16px;font-size:0.78rem;line-height:1.6;white-space:pre-wrap;word-break:break-all;color:var(--muted);margin:0;font-family:monospace">{% for line in lines %}{{ line | e }}
{% endfor %}</pre>
  </div>
</div>

<script>
  // Auto-scroll to bottom on initial load
  (function() {
    var c = document.getElementById('log-container');
    c.scrollTop = c.scrollHeight;
  })();
  // Keep scrolled to bottom after each HTMX refresh unless user has scrolled up
  document.getElementById('log-lines').addEventListener('htmx:afterSwap', function() {
    var c = document.getElementById('log-container');
    var atBottom = c.scrollHeight - c.scrollTop - c.clientHeight < 100;
    if (atBottom) c.scrollTop = c.scrollHeight;
  });
</script>
{% endblock %}
